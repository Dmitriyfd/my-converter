<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой маркетплейс</title>
  <style>
    body { font-family: system-ui, sans-serif; text-align: center; padding: 40px 20px; background: #f8fafc; }
    input, textarea { padding: 8px; width: 80%; max-width: 400px; margin: 5px 0; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 8px 16px; background: #2563eb; color: #fff; border: none; border-radius: 6px; cursor: pointer; margin: 5px; }
    button:hover { background: #1d4ed8; }
    .card { background: #fff; padding: 12px; margin: 10px auto; max-width: 400px; border-radius: 8px; border: 1px solid #ddd; text-align: left; }
    .card img { width: 100%; border-radius: 6px; margin-bottom: 8px; }
  </style>
</head>
<body>

<div id="auth-status" style="margin: 10px auto; text-align: center; font-family: sans-serif;">
  <span id="user-email">🔒 Гость</span>
  <button id="logout-btn" onclick="logout()" style="display:none; margin-left:8px; background:#f59e0b; color:#fff; border:none; padding:6px 12px; border-radius:6px; cursor:pointer;">Выйти</button>
</div>

  <h1>📦 Маркетплейс</h1>

  <div style="background:#f4f4f4; padding:15px; border-radius:8px; margin:10px auto; max-width:400px;">
    <h3>Вход</h3>
    <input id="a-email" placeholder="Email">
    <input id="a-pass" type="password" placeholder="Пароль">
    <button onclick="authLogin()">Войти</button>
    <button onclick="authReg()" style="background:#16a34a;">Регистрация</button>
    <p id="auth-msg" style="font-weight:bold;"></p>
  </div>

  <div id="ad-panel" style="background:#eef2ff; padding:15px; border-radius:8px; margin:10px auto; max-width:400px;">
    <h3>Новое объявление</h3>
    <input id="ad-title" placeholder="Название">
    <textarea id="ad-desc" placeholder="Описание" rows="3"></textarea>
    <input type="file" id="ad-photo" accept="image/*">
    <button onclick="createAd()" style="background:#16a34a;">Опубликовать</button>
    <p id="ad-msg" style="font-weight:bold;"></p>
  </div>


<input id="search-input" placeholder="🔍 Поиск по названию..." oninput="loadAds(this.value)" style="padding:8px; width:80%; max-width:400px; margin:10px auto; display:block; border-radius:6px; border:1px solid #ccc;">

  <div id="ads-list" style="margin:20px auto; max-width:450px; padding:10px; background:#fafafa; border-radius:8px;">
    <h3>Все объявления</h3>
    <p id="loading">Загрузка...</p>
  </div>








<!-- Leaflet стили и скрипт -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Кнопка переключения -->
<button id="toggle-map-btn" style="display:block; margin:10px auto; padding:8px 16px; background:#3b82f6; color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:14px;">🗺️ Показать объявления на карте</button>

<!-- Контейнер карты (скрыт по умолчанию) -->
<div id="map-container" style="display:none; margin:10px auto; max-width:800px;">
  <div id="map" style="height:350px; width:100%; border-radius:10px; border:1px solid #ddd;"></div>
  <div id="location-status" style="text-align:center; margin:8px 0; color:#555; font-size:14px;">🗺️ Кликни на карту, чтобы указать место</div>
  <button id="reset-loc-btn" onclick="resetLocation()" style="display:none; margin:0 auto; padding:6px 12px; border:1px solid #ccc; border-radius:6px; cursor:pointer;">🔄 Сбросить точку</button>
</div>



<div id="ad-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
  <div style="background:#fff; padding:20px; border-radius:10px; max-width:400px; width:90%; position:relative;">
    <button onclick="closeAdModal()" style="position:absolute; top:8px; right:8px; background:none; border:none; font-size:20px; cursor:pointer;">&times;</button>
    <img id="modal-img" src="" style="width:100%; border-radius:8px; margin-bottom:10px; display:none;">
    <h3 id="modal-title"></h3>
    <p id="modal-desc" style="color:#555;"></p>
    <p id="modal-coords" style="font-size:12px; color:#888;"></p>
  </div>
</div>







<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

// 🔹 1. SUPABASE
const supabaseUrl = 'https://kezprdouakvdiwjivlze.supabase.co';
const supabaseKey = 'sb_publishable_dwckqZDHdxb1DXRLpI__5A_qcCpTPfl';
const db = supabase.createClient(supabaseUrl, supabaseKey);

// 🔹 2. ПЕРЕМЕННЫЕ
let map, markersLayer, selLat = null, selLng = null, tempMarker = null;
let mapInitialized = false;
let currentAdsData = [];

// 🔹 3. КАРТА
function initMap() {
  if (mapInitialized) return;
  map = L.map('map').setView([55.7558, 37.6173], 10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  markersLayer = L.layerGroup().addTo(map);
  mapInitialized = true;

  map.on('click', e => {
    selLat = e.latlng.lat; selLng = e.latlng.lng;
    document.getElementById('location-status').textContent = `📍 Выбрано: ${selLat.toFixed(4)}, ${selLng.toFixed(4)}`;
    document.getElementById('reset-loc-btn').style.display = 'inline-block';
    if (tempMarker) map.removeLayer(tempMarker);
    tempMarker = L.marker([selLat, selLng]).addTo(map);
  });
}

function updateMap(ads) {
  if (!markersLayer) return;
  markersLayer.clearLayers();
  const coords = [];
  ads.forEach(ad => {
    if (ad.lat && ad.lng) {
      coords.push([ad.lat, ad.lng]);
      const popup = `<div style="text-align:center;min-width:130px;"><strong>${ad.title}</strong><br><button onclick="event.stopPropagation();openAdDetail('${ad.id}')" style="margin-top:6px;padding:4px 10px;background:#3b82f6;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;">Открыть</button></div>`;
      L.marker([ad.lat, ad.lng]).bindPopup(popup).addTo(markersLayer);
    }
  });
  if (coords.length > 0 && document.getElementById('map-container').style.display !== 'none') {
    map.fitBounds(L.latLngBounds(coords), { padding: [40, 40] });
  }
}

// 🔹 4. МОДАЛКА & СБРОС
function openAdDetail(id) {
  const ad = currentAdsData.find(a => a.id == id);
  if (!ad) return;
  document.getElementById('modal-title').textContent = ad.title;
  document.getElementById('modal-desc').textContent = ad.description || 'Без описания';
  document.getElementById('modal-coords').textContent = ad.lat && ad.lng ? `📍 ${ad.lat.toFixed(4)}, ${ad.lng.toFixed(4)}` : '';
  const img = document.getElementById('modal-img');
  if (ad.image_url) { img.src = ad.image_url; img.style.display = 'block'; } 
  else { img.style.display = 'none'; }
  document.getElementById('ad-modal').style.display = 'flex';
}
function closeAdModal() { document.getElementById('ad-modal').style.display = 'none'; }

function resetLocation() {
  selLat = selLng = null;
  document.getElementById('location-status').textContent = '🗺️ Кликни на карту, чтобы указать место';
  document.getElementById('reset-loc-btn').style.display = 'none';
  if (tempMarker) { map.removeLayer(tempMarker); tempMarker = null; }
}

// 🔹 5. SUPABASE ФУНКЦИИ
async function authLogin() {
  const { error } = await db.auth.signInWithPassword({ email: document.getElementById('a-email').value, password: document.getElementById('a-pass').value });
  const m = document.getElementById('auth-msg'); m.textContent = error ? error.message : '✅ Вошли

!'; m.style.color = error ? 'red' : 'green';
      checkAuth(); loadAds();
    }

    async function authReg() {
      const { error } = await db.auth.signUp({ email: document.getElementById('a-email').value, password: document.getElementById('a-pass').value });
      const m = document.getElementById('auth-msg'); m.textContent = error ? error.message : '✅ Создан! Проверь почту и войди.'; m.style.color = error ? 'red' : 'green';
    }

    async function createAd() {
      const title = document.getElementById('ad-title').value.trim();
      const desc = document.getElementById('ad-desc').value.trim();
      const fileInput = document.getElementById('ad-photo');
      const msg = document.getElementById('ad-msg');

      if (!title || !desc) { msg.style.color='red'; msg.textContent='Заполни название и описание'; return; }
      const { data: { user } } = await db.auth.getUser();
      if (!user) { msg.style.color='red'; msg.textContent='Войдите, чтобы создать объявление'; return; }
      if (selLat === null || selLng === null) { msg.style.color='red'; msg.textContent='🗺️ Кликни на карту, чтобы указать место'; return; }

      let photoUrl = null;
      if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        const fileName = `${Date.now()}_${file.name}`;
        const { error: upErr } = await db.storage.from('ad-photos').upload(fileName, file);
        if (upErr) { msg.style.color='red'; msg.textContent = 'Ошибка фото: ' + upErr.message; return; }
        photoUrl = db.storage.from('ad-photos').getPublicUrl(fileName).data.publicUrl;
      }

      const { error } = await db.from('ads').insert({ title, description: desc, image_url: photoUrl, user_id: user.id, lat: selLat, lng: selLng });
      if (error) { msg.style.color='red'; msg.textContent = 'Ошибка: ' + error.message; }
      else {
        msg.style.color='green'; msg.textContent = 'Добавлено!';
        document.getElementById('ad-title').value=''; document.getElementById('ad-desc').value=''; fileInput.value='';
        resetLocation(); loadAds();
      }
    }

    async function loadAds(query = '') {
      let dbQuery = db.from('ads').select('*').order('created_at', { ascending: false });
      if (query.trim()) dbQuery = dbQuery.ilike('title', `%${query}%`);
      const { data, error } = await dbQuery;
      if (error) { console.error(error); return; }

      currentAdsData = data || [];
      updateMap(currentAdsData);

      let html = '';
      currentAdsData.forEach(ad => {
        const img = ad.image_url ? `<img src="${ad.image_url}" style="width:100%; border-radius:6px; margin-bottom:8px;">` : '';
        html += `<div style="background:#fff; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd; text-align:left; position:relative;">
                  ${img}<strong>${ad.title}</strong><br>
                  <span style="color:#555; font-size:14px;">${ad.description || 'Без описания'}</span>
                  <button onclick="deleteAd(${ad.id})" style="position:absolute; top:8px; right:8px; background:#dc2626; color:#fff; border:none; border-radius:4px; padding:4px 8px; cursor:pointer; font-size:12px;">Удалить</button>
                </div>`;
      });
      document.getElementById('ads-list').innerHTML = `<h3>Все объявления</h3>` + (html || '<p>Ничего не найдено. Попробуй другой запрос или создай новое объявление! 👆</p>');
    }

    async function deleteAd(id) {
      if (!confirm('Точно удалить?')) return;
      const { error } = await db.from('ads').delete().eq('id', id);
      if (error) alert('Ошибка удаления: ' + error.message);
      else loadAds();
    }

    async function checkAuth() {
      const { data: { user } } = await db.auth.getUser();
      const emailSpan = document.getElementById('user-email');
      const logoutBtn = document.getElementById('logout-btn');




</script>
</body>
</html>
