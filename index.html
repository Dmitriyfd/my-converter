    body { font-family: system-ui, sans-serif; text-align: center; padding: 60px 20px; background: #f8fafc; }

    p { color: #475569; max-width: 500px; margin: 0 auto 30px; line-height: 1.5; }

<body>
  <h1>Конвертер 2D-планов</h1>
  <p>Прототип приложения, которое переводит фотографии чертежей в редактируемые векторы для AutoCAD.</p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabaseUrl = 'https://kezprdouakvdiwjivlze.supabase.co';
  const supabaseKey = 'sb_publishable_dwckqZDHdxb1DXRLpI__5A_qcCpTPfl';
  const db = supabase.createClient(supabaseUrl, supabaseKey);

<div style="background:#f4f4f4; padding:15px; border-radius:8px; margin:10px 0;">
  <h3>Вход / Регистрация</h3>
  <input id="reg-email" placeholder="Email" style="padding:6px; width:60%; margin-right:5px;">
  <input id="reg-pass" type="password" placeholder="Пароль" style="padding:6px; width:60%;">
  <button onclick="registerUser()" style="padding:6px 12px; background:#2563eb; color:#fff; border:none; cursor:pointer; margin-top:5px;">Зарегистрироваться</button>
  <p id="reg-msg" style="font-weight:bold;"></p>
</div>
<script>
  async function registerUser() {
    const email = document.getElementById('reg-email').value;
    const pass = document.getElementById('reg-pass').value;
    const msg = document.getElementById('reg-msg');
    const { data, error } = await db.auth.signUp({ email, password: pass });
    if (error) { msg.style.color='red'; msg.textContent = error.message; }
    else { msg.style.color='green'; msg.textContent = 'Успех! Проверь консоль или войди.'; }
  }
</script>



<div style="background:#eef2ff; padding:15px; border-radius:8px; margin:10px 0;">
  <h3>Новое объявление</h3>
  <input id="ad-title" placeholder="Название" style="padding:6px; width:80%; margin-bottom:5px;">
  <textarea id="ad-desc" placeholder="Описание" style="padding:6px; width:80%; height:60px; margin-bottom:5px;"></textarea>
  <button onclick="createAd()" style="padding:6px 12px; background:#16a34a; color:#fff; border:none; cursor:pointer;">Опубликовать</button>
  <p id="ad-msg" style="font-weight:bold;"></p>
</div>
<script>
  async function createAd() {
    const title = document.getElementById('ad-title').value;
    const desc = document.getElementById('ad-desc').value;
    const msg = document.getElementById('ad-msg');
    const { error } = await db.from('ads').insert({ title, description: desc });
    if (error) { msg.style.color='red'; msg.textContent = 'Ошибка: ' + error.message; }
    else { msg.style.color='green'; msg.textContent = 'Объявление добавлено!'; 
           document.getElementById('ad-title').value = ''; document.getElementById('ad-desc').value = ''; }
  }
</script>


</body>
